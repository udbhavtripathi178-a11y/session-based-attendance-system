<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeriClass | Smart Attendance</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4e73df, #1cc88a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 10px;
    font-weight: 600;
}

.status {
    font-size: 14px;
    margin-bottom: 20px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #4e73df;
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2e59d9;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}

.footer {
    margin-top: 15px;
    font-size: 12px;
    color: #888;
}
</style>
</head>
<body>

<div class="container">
    <h2>📍 VeriClass</h2>
    <p class="status" id="locationStatus" style="color:red;">
        Checking Location...
    </p>

    <form method="POST" action="/submit" onsubmit="return checkLocation()">
        <input type="text" name="roll" placeholder="Roll Number" required>
        <input type="text" name="name" placeholder="Full Name" required>

        <input type="hidden" name="lat" id="lat">
        <input type="hidden" name="lon" id="lon">

        <button type="submit" id="submitBtn" disabled>
            Mark Attendance
        </button>
    </form>

    <div class="footer">
        Smart Geo-Verified Attendance System
    </div>
</div>

<script>
function checkLocation() {
    if (!document.getElementById("lat").value) {
        alert("Please enable location first!");
        return false;
    }
    return true;
}

navigator.geolocation.getCurrentPosition(
    function(position) {
        document.getElementById("lat").value = position.coords.latitude;
        document.getElementById("lon").value = position.coords.longitude;

        document.getElementById("locationStatus").innerHTML = "Location Verified ✔";
        document.getElementById("locationStatus").style.color = "green";

        document.getElementById("submitBtn").disabled = false;
    },
    function() {
        document.getElementById("locationStatus").innerHTML = "Location access required ✖";
        document.getElementById("locationStatus").style.color = "red";
    }
);
</script>

</body>
</html>
